# Testbed scenario: 8 vertiports equally spaced around a ring, 8 STANDARD UAVs —
# denser than ring_4.yaml, more simultaneous missions crossing through the shared
# center where two synthetic buildings sit.

simulator:
  dt: 1.0
  total_timestep: 500
  mode: '3D'
  seed: 123

logging:
  enabled: true
  log_dir: 'logs'

rendering:
  enabled: true
  mode: 'offline'
  output_dir: 'renders'
  output_filename: 'testbed_ring_8'
  realtime_sleep: 0.01
  frame_skip: 4
  mp4_only: false

testbed_airspace:
  pattern: 'ring'
  num_vertiports: 8
  center: [0.0, 0.0]
  radius: 3000.0
  start_angle: 0.0
  landing_pad_capacity: 1
  altitude_range: [1500.0, 2200.0]
  building_z_height_mean: 70.0
  building_z_height_std: 20.0
  buildings:
    - center: [400.0, 0.0]
      width: 300.0
      depth: 300.0
      buffer_radius: 250.0
    - center: [-400.0, 0.0]
      width: 300.0
      depth: 300.0
      buffer_radius: 250.0

fleet_composition:
  - type_name: STANDARD
    count: 8
    dynamics: PointMass
    controller: PIDPointMassController
    sensor: PartialSensor
    planner: PointMass-PID
