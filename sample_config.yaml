# UAM Simulator Configuration
# component_schema.py structure has to respect this config.yaml

#### CONFIG ####
simulator:
  dt: 1.0
  total_timestep: 5000   # small for quick deployment runs
  mode: '2D'            # or '3D'
  seed: 23

logging:
  enabled: true
  log_dir: 'logs'       # episode data saved under logs/episode_<id>_<timestamp>/

rendering:
  enabled: true
  mode: 'offline'       # 'realtime', 'offline', or 'both'
  output_dir: 'renders'
  output_filename: 'episode'
  realtime_sleep: 0.01  # seconds to pause between real-time frames
  frame_skip: 4         # render every (frame_skip+1) steps; 0=every step, 4=every 5th

vertiport:
  number_of_landing_pad: 4

airspace:
  location_name: 'Austin, Texas, USA'
  number_of_vertiports: 3
  vertiport_tag_list: [['building', 'yes']]
  airspace_restricted_area_tag_list: [['building', 'office']]

# controller must be a key in VALID_CONTROLLERS   (component_schema.py)
# dynamics  must be a key in VALID_DYNAMICS        (component_schema.py)
# planner   must be a key in VALID_PLANNERS        (component_schema.py)
# sensor    must be a key in VALID_SENSORS         (component_schema.py)
fleet_composition:
  - type_name: STANDARD
    count: 3
    dynamics: PointMass
    controller: PIDPointMassController
    sensor: PartialSensor
    planner: PointMass-PID

#### CONFIG ####
